spring:
  application:
    name: starto-api
  datasource:
    url: jdbc:postgresql://localhost:5432/starto
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.springframework.transaction: DEBUG
    org.hibernate.SQL: DEBUG

server:
  port: 8081

openai:
  api-key: ${OPENAI_API_KEY}

google:
  ai:
    api-key: ${GEMINI_API_KEY}
  maps:
    api-key: dummy_Google_Maps_key

firebase:
  config-path: C:/Users/sagar/Documents/starto/starto-v3/starto-api/src/main/resources/firebase-service-account.json

razorpay:
  key:
    id: dummy_rzp_key
    secret: dummy_rzp_secret
  plan:
    id: plan_fake123456789